<div class="container footer-container">
  <p>
    {{ site.name | escape }} -
    <a href="mailto:{{ site.email }}" target="_blank">{{ site.email | escape }}</a>{%- if site.email2 -%}, <a href="mailto:{{ site.email2 }}" target="_blank">{{ site.email2 | escape }}</a>{%- endif -%}
    {%- if site.footer_show_references -%}
      &nbsp;- {{ site.references_title | default: "References on request" }}
    {%- endif -%}
  </p>
</div>
